<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/" class="brand">
        <img src="/static/logo.png" alt="Logo" width="25" height="25" />
        MonitorPro
      </a>
      <div class="navbar-links">
        <a href="/#features">Features</a>
        <a href="/#how-it-works">How it Works</a>
      </div>
    </nav>

    <div class="login-wrapper">
      <div class="login-box">
        <div class="login-logo">MonitorPro</div>
        <div class="login-sub">Create your account</div>

        {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
          <div class="form-group">
            <label>Username</label>
            <input
              type="text"
              name="username"
              placeholder="Enter username"
              autocomplete="off"
              required
            />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              name="password"
              placeholder="Create a password"
              required
            />
          </div>
          <button type="submit" class="btn-login">Sign Up</button>
        </form>

        <div class="login-footer-note">
         <a href="/">← back</a>&nbsp; | &nbsp;Already have an account? <a href="/login">Login</a>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-brand">MonitorPro</div>
      <div class="footer-text">SE Project | Real-Time System Monitoring</div>
    </footer>
  </body>
</html>
