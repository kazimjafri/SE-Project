<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | MonitorPro</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-box">
        <div class="login-logo">MonitorPro</div>
        <div class="login-sub">Software Monitoring System | Admin Panel</div>

        {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="form-group">
            <label>Username</label>
            <input
              type="text"
              name="username"
              placeholder="Enter username"
              autocomplete="off"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              name="password"
              placeholder="Enter password"
              required
            />
          </div>
          <button type="submit" class="btn-login">Login</button>
        </form>
      </div>
    </div>
  </body>
</html>
